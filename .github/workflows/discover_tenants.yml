name: Discover new job board sources

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: db-write
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python discover.py
        env:
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
      - name: Commit updated DB
        run: |
          git config user.name "job-alert-bot"
          git config user.email "actions@github.com"
          git add db/jobs.sqlite
          git diff --staged --quiet && exit 0
          git commit -m "chore: update discovered sources [skip ci]"
          git pull --rebase
          git push
