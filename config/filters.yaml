include_patterns:
  - '\bjunior\b'
  - '\bentry[\s-]?level\b'
  - '\bnew\s?grad(uate)?\b'
  - '\bsoftware engineer\s*i\b'
  - '\bswe\s*i\b'
  - '\bassociate software engineer\b'
  - '\b(0|1)\s*-?\s*2\+?\s*years?\b'

exclude_patterns:
  - '\bsenior\b'
  - '\bsr\.?\b'
  - '\bstaff\b'
  - '\bprincipal\b'
  - '\blead\b'
  - '\bmanager\b'
  - '\b(3|4|5|6|7|8|9)\+?\s*years?\b'
  - '\bii\b'
  - '\biii\b'
